name: "Build Zola site for GitHub Pages"

on:
  push:
    branches: [ main ]

jobs:
  build:
    name: Build and upload
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # Ensure theme submodules are checked out so Zola can find theme.toml
          submodules: 'recursive'
          fetch-depth: 0

      - name: Run build action (local composite)
        uses: ./.github/actions/build-zola
        with:
          zola_version: "v0.22.0"
          working_directory: "."
          output_dir: "public"
          build_flags: ""
          check_links: "false"
          check_flags: ""