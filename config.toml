theme = "apollo"
taxonomies = [{ name = "tags" }]
base_url = "https://dailin3.github.io/blogs/"
title = "Dailin"
compile_sass = true
build_search_index = true

[markdown.highlighting]
style = "class"
light_theme = "github-light"
dark_theme = "github-dark"
error_on_missing_language = true

[search]
include_title = true
include_description = true
include_path = true
include_content = true
index_format = "elasticlunr_json"

[extra]
web_url = "https://dailin3.github.io/blogs/"
theme = "toggle-auto"
favicon = "/icons/social/github.svg"
toc = true
fancy_code = true
dynamic_note = true
use_cdn = true
mathjax = true
socials = [
  { name = "twitter", url = "https://x.com/diln23745615", icon = "twitter" },
  { name = "github", url = "https://github.com/dailin3/", icon = "github" },
]
menu = [
  { name = "posts", url = "/posts", weight = 1 },
  { name = "projects", url = "/projects", weight = 2 },
  { name = "about", url = "/about", weight = 3 },
  { name = "tags", url = "/tags", weight = 4 },
]
stylesheets = [
]

fediverse = true
fediverse_creator = "@dailin@mastodon.social"

repo_url = "https://github.com/dailin3/blogs/tree/main/content/" 

# the /tag page sorting
[extra.taxonomies]
sort_by = "page_count"
reverse = true

[extra.analytics]
enabled = true
[extra.analytics.umami]
website_id = "29decdcd-1118-45d5-9131-b05e695e57cc"
host_url = "https://api-gateway.umami.dev/"